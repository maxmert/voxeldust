apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: voxeldust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voxeldust-gateway
  template:
    metadata:
      labels:
        app: voxeldust-gateway
    spec:
      containers:
      - name: gateway
        image: voxeldust-gateway:latest
        imagePullPolicy: Never
        args:
        - "--listen-addr=0.0.0.0:7777"
        - "--orchestrator-url=http://orchestrator.voxeldust.svc.cluster.local:8080"
        - "--universe-seed=1"
        - "--default-galaxy-index=0"
        - "--default-star-index=0"
        ports:
        - containerPort: 7777
          protocol: TCP
        resources:
          limits:
            memory: "128Mi"
            cpu: "250m"
          requests:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: voxeldust
spec:
  type: NodePort
  selector:
    app: voxeldust-gateway
  ports:
  - port: 7777
    targetPort: 7777
    nodePort: 30777
    protocol: TCP
