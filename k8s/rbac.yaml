apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: voxeldust
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shard-manager
  namespace: voxeldust
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-shard-manager
  namespace: voxeldust
subjects:
- kind: ServiceAccount
  name: orchestrator
  namespace: voxeldust
roleRef:
  kind: Role
  name: shard-manager
  apiGroup: rbac.authorization.k8s.io
